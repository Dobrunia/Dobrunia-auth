# Dobrunia Auth — сервер: bump version в server/package.json → тесты, билд, выгрузка по FTP.
# Деплой только если ci успешен (needs: ci).
# Корень FTP-логина = целевая папка приложения (настроено у провайдера).
#
# Секреты (Settings → Secrets → Actions):
#   FTP_SERVER    — хост (порт: host:2121)
#   FTP_USERNAME
#   FTP_PASSWORD
#
# FTPS: при необходимости раскомментируй protocol: ftps (или ftps-legacy — README action).
#
# «Timeout when trying to open data connection to … :39xxx» — passive FTP: раннер не
# достучался до порта данных. Частые причины: (1) в ответе PASV фигурирует внутренний IP
# хостинга — в панели ищи «внешний IP для FTP» / masquerade / «пассивный режим»;
# (2) файрвол не пускает диапазон пассивных портов с интернета — открыть у провайдера;
# (3) только FTPS — тогда protocol: ftps. Иначе: SFTP/SCP, git pull на сервере, self-hosted runner.
#
# На сервере после первого деплоя при необходимости один раз: npm ci --omit=dev
# (CI не кладёт node_modules в архив; .env на хостинге не трогаем.)

name: Server CI & deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/package.json'
      - '.github/workflows/deploy-server.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/package.json'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Version bump?
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.check.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare semver in server/package.json
        id: check
        run: |
          set -euo pipefail
          cur=$(jq -r .version server/package.json)

          ver_gt() {
            [ -z "${2:-}" ] && return 0
            [ "$1" = "$2" ] && return 1
            test "$(printf '%s\n' "$2" "$1" | sort -V | tail -n1)" = "$1"
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=true" >> "$GITHUB_OUTPUT"
            echo "Manual run: skip version gate"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            prev=$(git show "${base}:server/package.json" 2>/dev/null | jq -r .version || echo "")
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ]; then
              echo "bump=true" >> "$GITHUB_OUTPUT"
              echo "No parent commit: treat as bump"
              exit 0
            fi
            prev=$(git show "${before}:server/package.json" 2>/dev/null | jq -r .version || echo "")
          fi

          if [ -z "$prev" ]; then
            echo "bump=true" >> "$GITHUB_OUTPUT"
            echo "No previous version: bump"
            exit 0
          fi

          if ver_gt "$cur" "$prev"; then
            echo "bump=true" >> "$GITHUB_OUTPUT"
            echo "Version $prev → $cur (bump)"
          else
            echo "bump=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged or not increased ($prev → $cur): skip CI/deploy"
          fi

  ci:
    name: Test & build
    needs: version
    if: needs.version.outputs.bump == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Assemble FTP payload
        run: |
          mkdir -p ../server-ftp
          cp -r dist ../server-ftp/
          cp package.json package-lock.json ../server-ftp/

      - name: Upload deploy artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: server-ftp
          path: server-ftp
          retention-days: 7

  deploy:
    name: Deploy over FTP
    needs: [version, ci]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.version.outputs.bump == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: server-ftp
          path: server-ftp

      # server-dir не задаём — заливка в корень FTP-пользователя (у провайдера уже домашний каталог приложения).
      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./server-ftp/
          log-level: verbose
          # protocol: ftps
          # port: 21
          # dangerous-clean-slate: true — не включать: снесёт .env и прочее вне артефакта
