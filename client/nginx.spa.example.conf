# Пример для SPA (Vue Router, history mode).
# Корень сайта = каталог после `vite build` (содержимое dist/: index.html, assets/, vite.svg).
#
# Без try_files запросы вроде /login, /oauth-bridge дают 404 — nginx ищет файл "login", его нет.

server {
    listen 443 ssl;
    # server_name auth.example.test;
    # root /var/www/auth-spa;   # полный путь к содержимому dist
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # долгий кеш только для ассетов с хешами в имени (Vite)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
